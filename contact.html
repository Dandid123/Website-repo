<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact</title>
  <style>
    body{font-family:Segoe UI,Arial,Helvetica,sans-serif;max-width:740px;margin:32px auto;padding:0 16px;color:#222}
    form{display:grid;gap:12px}
    label{font-weight:600}
    input[type="text"],input[type="email"],textarea{width:100%;padding:10px;border:1px solid #ccc;border-radius:4px}
    button{padding:10px 16px;background:#0366d6;color:#fff;border:none;border-radius:6px;cursor:pointer}
    .hint{font-size:0.9rem;color:#555}
  </style>
</head>
<body>
  <h1>Contact</h1>
  <p class="hint">Use the form below to send a message — replies go to the email you provide.</p>

  <form id="contact-form" action="https://formspree.io/f/xnjkzapo" method="POST" accept-charset="utf-8" novalidate>
    <label for="name">Name</label>
    <input id="name" name="name" type="text" required autocomplete="name" />

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required autocomplete="email" />

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="6" required></textarea>

    <!-- Honeypot to reduce spam (leave name _gotcha) -->
    <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

    <div id="form-status" role="status" aria-live="polite" style="color:#155724;background:#d4edda;border:1px solid #c3e6cb;padding:10px;border-radius:4px;display:none;margin-top:8px"></div>

    <button type="submit">Send</button>
  </form>

  <script>
  (function(){
    const form = document.getElementById('contact-form');
    const statusEl = document.getElementById('form-status');
    form.addEventListener('submit', async function(e){
      e.preventDefault();
      statusEl.style.display = 'none';
      statusEl.textContent = '';
      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      const prevText = submitBtn.textContent;
      submitBtn.textContent = 'Sending…';
      const data = new FormData(form);
      try {
        const resp = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });
        if (resp.ok) {
          form.style.display = 'none';
          statusEl.style.display = 'block';
          statusEl.style.color = '#155724';
          statusEl.style.background = '#d4edda';
          statusEl.style.border = '1px solid #c3e6cb';
          statusEl.textContent = 'Thanks — message sent.';
        } else {
          const json = await resp.json().catch(() => null);
          const msg = (json && json.error) ? json.error : 'Oops — there was a problem sending your message.';
          statusEl.style.display = 'block';
          statusEl.style.color = '#721c24';
          statusEl.style.background = '#f8d7da';
          statusEl.style.border = '1px solid #f5c6cb';
          statusEl.textContent = msg;
          submitBtn.disabled = false;
          submitBtn.textContent = prevText;
        }
      } catch (err) {
        statusEl.style.display = 'block';
        statusEl.style.color = '#721c24';
        statusEl.style.background = '#f8d7da';
        statusEl.style.border = '1px solid #f5c6cb';
        statusEl.textContent = 'Network error — please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = prevText;
      }
    });
  })();
  </script>
</body>
</html>
